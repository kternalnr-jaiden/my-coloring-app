<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🎨 우리아이 동물 색칠공부</title>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Round+Square:wght@400;700;800&family=Jua&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FFF9F0;
    --primary: #FF6B6B;
    --secondary: #FFD93D;
    --accent: #6BCB77;
    --blue: #4D96FF;
    --purple: #C77DFF;
    --card: #FFFFFF;
    --shadow: 0 8px 32px rgba(0,0,0,0.12);
    --radius: 24px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    font-family: 'Jua', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px;
    overflow-x: hidden;
  }

  /* ── 배경 장식 ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(circle at 10% 20%, #FFD93D33 0%, transparent 40%),
      radial-gradient(circle at 90% 80%, #6BCB7733 0%, transparent 40%),
      radial-gradient(circle at 80% 10%, #C77DFF22 0%, transparent 35%);
    pointer-events: none;
    z-index: 0;
  }

  .app-wrapper {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 520px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  /* ── 헤더 ── */
  header {
    text-align: center;
    padding: 8px 0 4px;
  }

  header h1 {
    font-size: clamp(22px, 5vw, 32px);
    color: var(--primary);
    text-shadow: 3px 3px 0 #FFD93D, 5px 5px 0 rgba(255,107,107,0.15);
    letter-spacing: -0.5px;
    line-height: 1.2;
  }

  header p {
    font-size: 14px;
    color: #aaa;
    font-family: 'Nanum Round Square', sans-serif;
    margin-top: 4px;
  }

  /* ── 도안 선택 탭 ── */
  .page-selector {
    display: flex;
    gap: 12px;
    background: white;
    border-radius: 999px;
    padding: 6px;
    box-shadow: var(--shadow);
  }

  .page-tab {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    border-radius: 999px;
    border: none;
    background: transparent;
    font-family: 'Jua', sans-serif;
    font-size: 16px;
    color: #999;
    cursor: pointer;
    transition: all 0.25s ease;
  }

  .page-tab .tab-emoji { font-size: 20px; }

  .page-tab.active {
    background: var(--primary);
    color: white;
    box-shadow: 0 4px 16px rgba(255,107,107,0.4);
    transform: scale(1.04);
  }

  /* ── 캔버스 영역 ── */
  .canvas-wrapper {
    width: 100%;
    background: white;
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 12px;
    position: relative;
  }

  .canvas-container {
    position: relative;
    width: 100%;
    padding-top: 141%; /* A4 세로 비율 */
    border-radius: 16px;
    overflow: hidden;
    background: white;
    border: 2px solid #F0F0F0;
    touch-action: none;
  }

  #drawCanvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    touch-action: none;
    cursor: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24'><circle cx='12' cy='12' r='8' fill='%23FF6B6B' opacity='0.7'/></svg>") 12 12, crosshair;
  }

  #drawCanvas.eraser-mode {
    cursor: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='28' height='28' viewBox='0 0 28 28'><rect x='2' y='2' width='24' height='24' rx='4' fill='white' stroke='%23ddd' stroke-width='2'/></svg>") 14 14, crosshair;
  }

  #coloringImage {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: fill;
    mix-blend-mode: multiply;
    pointer-events: none;
    transition: opacity 0.3s;
  }

  /* 페이지 전환 애니메이션 */
  .canvas-container.fade-out #coloringImage { opacity: 0; }
  .canvas-container.fade-out #drawCanvas  { opacity: 0; }

  /* ── 팔레트 ── */
  .palette-section {
    width: 100%;
    background: white;
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 16px;
  }

  .section-label {
    font-size: 13px;
    color: #bbb;
    font-family: 'Nanum Round Square', sans-serif;
    font-weight: 700;
    margin-bottom: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .palette {
    display: grid;
    grid-template-columns: repeat(9, 1fr);
    gap: 8px;
    margin-bottom: 14px;
  }

  .color-btn {
    aspect-ratio: 1;
    border-radius: 50%;
    border: 3px solid white;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    position: relative;
    -webkit-tap-highlight-color: transparent;
  }

  .color-btn:active { transform: scale(0.9); }

  .color-btn.selected {
    transform: scale(1.2);
    box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    border: 3px solid rgba(255,255,255,0.9);
    outline: 3px solid #333;
    outline-offset: 2px;
  }

  /* ── 도구 바 ── */
  .tools-section {
    width: 100%;
    background: white;
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .brush-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .brush-row label {
    font-size: 14px;
    color: #888;
    font-family: 'Nanum Round Square', sans-serif;
    white-space: nowrap;
    min-width: 56px;
  }

  input[type=range] {
    flex: 1;
    height: 8px;
    border-radius: 99px;
    -webkit-appearance: none;
    appearance: none;
    background: linear-gradient(to right, var(--primary) 0%, var(--primary) var(--val, 40%), #eee var(--val, 40%), #eee 100%);
    outline: none;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: var(--primary);
    box-shadow: 0 2px 8px rgba(255,107,107,0.5);
    cursor: pointer;
  }

  .brush-preview {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: var(--primary);
    transition: width 0.15s, height 0.15s;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .action-btns {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
  }

  .action-btn {
    padding: 14px 8px;
    border-radius: 16px;
    border: none;
    font-family: 'Jua', sans-serif;
    font-size: 15px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    -webkit-tap-highlight-color: transparent;
  }

  .action-btn .btn-icon { font-size: 22px; }
  .action-btn:active { transform: scale(0.95); }

  .btn-eraser {
    background: #FFF0F0;
    color: #FF6B6B;
  }
  .btn-eraser.active {
    background: #FF6B6B;
    color: white;
    box-shadow: 0 4px 16px rgba(255,107,107,0.4);
  }

  .btn-clear {
    background: #FFF8E0;
    color: #E6A817;
  }

  .btn-save {
    background: #F0FFF4;
    color: #2D9B4E;
  }

  /* ── 완성 메시지 토스트 ── */
  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: #333;
    color: white;
    padding: 14px 28px;
    border-radius: 999px;
    font-family: 'Jua', sans-serif;
    font-size: 16px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.25);
    transition: transform 0.4s cubic-bezier(.34,1.56,.64,1);
    z-index: 9999;
    pointer-events: none;
  }

  .toast.show {
    transform: translateX(-50%) translateY(0);
  }

  /* ── 반응형 ── */
  @media (max-width: 380px) {
    .palette { grid-template-columns: repeat(8, 1fr); gap: 6px; }
    .action-btn { font-size: 13px; }
    .action-btn .btn-icon { font-size: 18px; }
  }
</style>
</head>
<body>

<div class="app-wrapper">

  <!-- 헤더 -->
  <header>
    <h1>🎨 신나는 색칠놀이</h1>
    <p>좋아하는 동물을 예쁘게 색칠해봐요!</p>
  </header>

  <!-- 도안 선택 -->
  <div class="page-selector">
    <button class="page-tab active" data-page="0" onclick="selectPage(0)">
      <span class="tab-emoji">🦄</span> 유니콘·토끼
    </button>
    <button class="page-tab" data-page="1" onclick="selectPage(1)">
      <span class="tab-emoji">🐧</span> 펭귄·사슴
    </button>
  </div>

  <!-- 캔버스 -->
  <div class="canvas-wrapper">
    <div class="canvas-container" id="canvasContainer">
      <canvas id="drawCanvas"></canvas>
      <img id="coloringImage" src="images/page1.png" alt="색칠 도안">
    </div>
  </div>

  <!-- 팔레트 -->
  <div class="palette-section">
    <div class="section-label">🌈 색깔을 골라요</div>
    <div class="palette" id="palette"></div>

    <!-- 직접 색상 선택 -->
    <div style="display:flex; align-items:center; gap:10px;">
      <label style="font-size:13px; color:#aaa; font-family:'Nanum Round Square',sans-serif; font-weight:700;">직접 고르기</label>
      <input type="color" id="customColor" value="#FF6B6B"
        style="width:48px; height:48px; border-radius:50%; border:3px solid white; box-shadow:0 2px 8px rgba(0,0,0,0.15); cursor:pointer; padding:2px;"
        oninput="pickCustomColor(this.value)">
    </div>
  </div>

  <!-- 도구 -->
  <div class="tools-section">
    <div class="section-label">🖌️ 도구</div>

    <div class="brush-row">
      <label>붓 크기</label>
      <input type="range" id="brushSlider" min="5" max="60" value="25"
        oninput="changeBrushSize(this.value)">
      <div class="brush-preview" id="brushPreview"></div>
    </div>

    <div class="action-btns">
      <button class="action-btn btn-eraser" id="eraserBtn" onclick="toggleEraser()">
        <span class="btn-icon">🧹</span>
        지우개
      </button>
      <button class="action-btn btn-clear" onclick="clearCanvas()">
        <span class="btn-icon">✨</span>
        처음부터
      </button>
      <button class="action-btn btn-save" onclick="saveImage()">
        <span class="btn-icon">💾</span>
        저장하기
      </button>
    </div>
  </div>

</div>

<!-- 토스트 알림 -->
<div class="toast" id="toast"></div>

<script>
// ──────────────────────────────────────────────
// 도안 목록
// ──────────────────────────────────────────────
const PAGES = [
  { src: 'images/page1.png', label: '유니콘·토끼' },
  { src: 'images/page2.png', label: '펭귄·사슴' },
];

let currentPageIndex = 0;

// 각 페이지별 캔버스 이미지 데이터 저장 (전환 시 유지)
const savedCanvasData = new Array(PAGES.length).fill(null);

// ──────────────────────────────────────────────
// 팔레트 색상
// ──────────────────────────────────────────────
const COLORS = [
  '#FF5252', '#FF8C00', '#FFD93D', '#ADFF2F',
  '#6BCB77', '#4D96FF', '#C77DFF', '#FF69B4',
  '#A0522D', '#888888', '#333333', '#FFFFFF',
  '#FFB3BA', '#FFDAB9', '#FFFACD', '#E0FFD1',
  '#B3E5FC', '#E1BEE7', '#F8BBD9', '#D7CCC8',
];

// ──────────────────────────────────────────────
// 캔버스 초기화
// ──────────────────────────────────────────────
const canvas   = document.getElementById('drawCanvas');
const ctx      = canvas.getContext('2d');
const container = document.getElementById('canvasContainer');
const coloringImage = document.getElementById('coloringImage');

function resizeCanvas() {
  const saved = ctx.getImageData(0, 0, canvas.width, canvas.height);
  canvas.width  = container.clientWidth;
  canvas.height = container.clientHeight;
  ctx.putImageData(saved, 0, 0);
}

const resizeObserver = new ResizeObserver(() => resizeCanvas());
resizeObserver.observe(container);
resizeCanvas();

// ──────────────────────────────────────────────
// 그리기 상태
// ──────────────────────────────────────────────
let painting    = false;
let currentColor = '#FF5252';
let brushSize   = 25;
let isEraser    = false;
let lastX = 0, lastY = 0;

function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width  / rect.width;
  const scaleY = canvas.height / rect.height;
  const src = e.touches ? e.touches[0] : e;
  return {
    x: (src.clientX - rect.left) * scaleX,
    y: (src.clientY - rect.top)  * scaleY,
  };
}

function startDraw(e) {
  e.preventDefault();
  painting = true;
  const { x, y } = getPos(e);
  lastX = x; lastY = y;
  ctx.beginPath();
  ctx.arc(x, y, (isEraser ? brushSize * 1.5 : brushSize) / 2, 0, Math.PI * 2);
  ctx.fillStyle = isEraser ? 'rgba(0,0,0,0)' : currentColor;
  if (isEraser) {
    ctx.globalCompositeOperation = 'destination-out';
    ctx.fill();
    ctx.globalCompositeOperation = 'source-over';
  } else {
    ctx.fill();
  }
}

function doDraw(e) {
  if (!painting) return;
  e.preventDefault();
  const { x, y } = getPos(e);

  ctx.beginPath();
  ctx.lineWidth  = isEraser ? brushSize * 1.5 : brushSize;
  ctx.lineCap    = 'round';
  ctx.lineJoin   = 'round';

  if (isEraser) {
    ctx.globalCompositeOperation = 'destination-out';
    ctx.strokeStyle = 'rgba(0,0,0,1)';
  } else {
    ctx.globalCompositeOperation = 'source-over';
    ctx.strokeStyle = currentColor;
  }

  ctx.moveTo(lastX, lastY);
  ctx.lineTo(x, y);
  ctx.stroke();
  ctx.globalCompositeOperation = 'source-over';

  lastX = x; lastY = y;
}

function endDraw() {
  painting = false;
  ctx.beginPath();
}

canvas.addEventListener('mousedown',  startDraw);
canvas.addEventListener('mousemove',  doDraw);
canvas.addEventListener('mouseup',    endDraw);
canvas.addEventListener('mouseleave', endDraw);
canvas.addEventListener('touchstart', startDraw, { passive: false });
canvas.addEventListener('touchmove',  doDraw,    { passive: false });
canvas.addEventListener('touchend',   endDraw);

// ──────────────────────────────────────────────
// 팔레트 빌드
// ──────────────────────────────────────────────
function buildPalette() {
  const palette = document.getElementById('palette');
  palette.innerHTML = '';
  COLORS.forEach(color => {
    const btn = document.createElement('div');
    btn.className = 'color-btn' + (color === currentColor ? ' selected' : '');
    btn.style.background = color;
    if (color === '#FFFFFF') btn.style.border = '3px solid #ddd';
    btn.onclick = () => changeColor(color);
    palette.appendChild(btn);
  });
}
buildPalette();

function changeColor(color) {
  currentColor = color;
  isEraser = false;
  canvas.classList.remove('eraser-mode');
  document.getElementById('eraserBtn').classList.remove('active');
  document.getElementById('customColor').value = color;
  updateBrushPreview();
  buildPalette();
}

function pickCustomColor(color) {
  changeColor(color);
}

// ──────────────────────────────────────────────
// 붓 크기
// ──────────────────────────────────────────────
function changeBrushSize(val) {
  brushSize = parseInt(val);
  updateBrushPreview();
  // 슬라이더 gradient 업데이트
  const slider = document.getElementById('brushSlider');
  const pct = ((val - slider.min) / (slider.max - slider.min)) * 100;
  slider.style.setProperty('--val', pct + '%');
}

function updateBrushPreview() {
  const preview = document.getElementById('brushPreview');
  const size = Math.min(Math.max(brushSize, 10), 40);
  preview.style.width  = size + 'px';
  preview.style.height = size + 'px';
  preview.style.background = isEraser ? '#eee' : currentColor;
  preview.style.border = isEraser ? '2px dashed #ccc' : 'none';
}
changeBrushSize(25); // 초기화

// ──────────────────────────────────────────────
// 지우개 토글
// ──────────────────────────────────────────────
function toggleEraser() {
  isEraser = !isEraser;
  const btn = document.getElementById('eraserBtn');
  if (isEraser) {
    btn.classList.add('active');
    canvas.classList.add('eraser-mode');
  } else {
    btn.classList.remove('active');
    canvas.classList.remove('eraser-mode');
  }
  updateBrushPreview();
}

// ──────────────────────────────────────────────
// 전체 지우기
// ──────────────────────────────────────────────
function clearCanvas() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  showToast('✨ 깨끗하게 지워졌어요!');
}

// ──────────────────────────────────────────────
// 저장하기 (도안 + 색칠 합성)
// ──────────────────────────────────────────────
function saveImage() {
  const offscreen = document.createElement('canvas');
  offscreen.width  = canvas.width;
  offscreen.height = canvas.height;
  const oc = offscreen.getContext('2d');

  // 1) 흰 배경
  oc.fillStyle = 'white';
  oc.fillRect(0, 0, offscreen.width, offscreen.height);

  // 2) 색칠 레이어
  oc.drawImage(canvas, 0, 0);

  // 3) 도안 이미지 위에 multiply로 합성
  oc.globalCompositeOperation = 'multiply';
  oc.drawImage(coloringImage, 0, 0, offscreen.width, offscreen.height);
  oc.globalCompositeOperation = 'source-over';

  const link = document.createElement('a');
  link.download = `색칠공부_${PAGES[currentPageIndex].label}_${Date.now()}.png`;
  link.href = offscreen.toDataURL('image/png');
  link.click();
  showToast('💾 저장했어요! 잘했어요 🎉');
}

// ──────────────────────────────────────────────
// 페이지 전환
// ──────────────────────────────────────────────
function selectPage(index) {
  if (index === currentPageIndex) return;

  // 현재 캔버스 저장
  savedCanvasData[currentPageIndex] = ctx.getImageData(0, 0, canvas.width, canvas.height);

  // 탭 UI 업데이트
  document.querySelectorAll('.page-tab').forEach((btn, i) => {
    btn.classList.toggle('active', i === index);
  });

  currentPageIndex = index;

  // 페이드 전환
  container.classList.add('fade-out');
  setTimeout(() => {
    coloringImage.src = PAGES[index].src;

    // 저장된 데이터 복원
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (savedCanvasData[index]) {
      ctx.putImageData(savedCanvasData[index], 0, 0);
    }

    container.classList.remove('fade-out');
  }, 200);
}

// ──────────────────────────────────────────────
// 토스트 알림
// ──────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}
</script>
</body>
</html>
